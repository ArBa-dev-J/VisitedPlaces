info:
  name: uploadNewPlace
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/v1/places/newPlace
  body:
    type: multipart-form
    data:
      - name: image
        type: text
        value: ""
      - name: name
        type: text
        value: test
      - name: place_type
        type: text
        value: castle
      - name: description
        type: text
        value: ""
      - name: address
        type: text
        value: dsadsa
      - name: rating
        type: text
        value: "5"
      - name: is_free
        type: text
        value: "false"
        contentType: bool
      - name: city_id
        type: text
        value: "1"
        contentType: number
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
